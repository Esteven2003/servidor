name: Publicar Docker en GitHub

# El proceso se activará cada vez que hagas "git push" a la rama main
on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Esto guardará la imagen con tu nombre de usuario de github y el nombre del repositorio
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar el código del repositorio en el servidor de GitHub
      - name: Descargar código
        uses: actions/checkout@v4

      # 2. Iniciar sesión en el registro de Docker de GitHub
      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Construir y subir la imagen Docker automáticamente
      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest